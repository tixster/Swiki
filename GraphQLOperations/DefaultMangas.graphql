query DefaultMangas(
  $page: PositiveInt = 1
  $limit: PositiveInt = 1
  $search: String
) {
  mangas(page: $page, limit: $limit, search: $search) {
    id
    malId
    name
    russian
    licenseNameRu
    english
    japanese
    synonyms
    kind
    score
    status
    volumes
    chapters
    airedOn { year month day date }
    releasedOn { year month day date }
    url

    poster { id originalUrl mainUrl }

    licensors
    createdAt
    updatedAt
    isCensored

    genres { id name russian kind }
    publishers { id name }

    externalLinks {
      id
      kind
      url
      createdAt
      updatedAt
    }

    personRoles {
      id
      rolesRu
      rolesEn
      person { id name poster { id } }
    }
    characterRoles {
      id
      rolesRu
      rolesEn
      character { id name poster { id } }
    }

    related {
      id
      anime {
        id
        name
      }
      manga {
        id
        name
      }
      relationKind
      relationText
    }

    scoresStats { score count }
    statusesStats { status count }

    description
    descriptionHtml
    descriptionSource
  }
}
